<!DOCTYPE html>
<html lang="ko">
  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>버추얼 3D 캐릭터 제작 커미션</title>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
      <style>
                :root {
                              --primary-pink: #ff8fa3;
                              --secondary-pink: #ffb3c1;
                              --accent-pink: #ff6b8a;
                              --vrc-purple: #9575cd;
                              --bg-color: #fff5f6;
                              --card-shadow: 0 10px 30px rgba(255, 143, 163, 0.12);
                              --hover-shadow: 0 20px 40px rgba(255, 143, 163, 0.25);
                }

                * {
                              margin: 0;
                              padding: 0;
                              box-sizing: border-box;
                              -webkit-font-smoothing: antialiased;
                }

                body {
                              font-family: 'Noto Sans KR', sans-serif;
                              background-color: var(--bg-color);
                              color: #444;
                              line-height: 1.6;
                              overflow-x: hidden;
                }

                /* 공통 애니메이션 클래스 */
                .hover-bounce {
                              transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                }
                .hover-bounce:hover {
                              transform: translateY(-10px) scale(1.02);
                              box-shadow: var(--hover-shadow) !important;
                }

                /* 헤더 섹션 */
                .header {
                              width: 100%;
                              background: linear-gradient(135deg, #ff8fa3 0%, #ffb3c1 40%, #ffd6dc 70%, #ffe8ec 100%);
                              padding: 80px 20px;
                              text-align: center;
                              color: #fff;
                }

                .header-badge-group {
                              display: flex;
                              gap: 8px;
                              justify-content: center;
                              margin-bottom: 15px;
                              flex-wrap: wrap;
                }

                .badge {
                              background: rgba(255, 255, 255, 0.3);
                              padding: 4px 12px;
                              border-radius: 20px;
                              font-size: 12px;
                              font-weight: 700;
                              border: 1px solid rgba(255, 255, 255, 0.5);
                }

                .header h1 {
                              font-size: clamp(28px, 6vw, 48px);
                            
      </style></title>
  </head>
